<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#1a0a2e">
  <title>Заявки</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/inbox.css">
</head>
<body>
  <div class="app inbox-app">
    <section class="inbox-login" id="loginScreen">
      <h1 class="inbox-login__title">Заявки</h1>
      <p class="inbox-login__sub">Введи пароль</p>
      <form class="form" id="loginForm">
        <label class="field">
          <span class="field__label">Пароль</span>
          <input class="field__input" type="password" id="passwordInput" autocomplete="current-password" required>
        </label>
        <p class="inbox-login__error" id="loginError" hidden>Невірний пароль</p>
        <button class="btn btn--primary btn--large" type="submit">Увійти</button>
      </form>
    </section>

    <div id="inboxScreen">
      <header class="header">
        <div class="header__brand">Заявки</div>
        <div class="inbox-toolbar">
          <button type="button" class="btn btn--ghost" id="logoutBtn">Вийти</button>
          <button type="button" class="btn btn--primary" id="refreshBtn">Оновити</button>
        </div>
      </header>

      <main class="inbox-main">
        <p class="inbox-status" id="status">Завантаження…</p>
        <div class="inbox-list" id="list"></div>
      </main>
    </div>
  </div>

  <script src="js/config.js?v=9"></script>
  <script src="js/crypto.js?v=9"></script>
  <script src="js/inbox.js?v=9"></script>
</body>
</html>
