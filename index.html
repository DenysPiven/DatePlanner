<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a0a2e">
  <meta name="description" content="Анкета на побачення у Вінниці">
  <title>Побачення у Вінниці</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="header" id="header">
      <div class="header__brand" id="brand"></div>
      <div class="header__progress">
        <div class="header__progress-bar" id="progressBar"></div>
      </div>
      <div class="header__step" id="stepLabel"></div>
    </header>

    <main class="main" id="main">
      <section class="step step--active" data-step="0">
        <div class="intro">
          <div class="intro__gallery" id="introGallery"></div>
          <div class="intro__dots" id="introDots"></div>
          <div class="intro__meta" id="introMeta"></div>
          <h1 class="intro__title" id="introTitle"></h1>
          <p class="intro__tagline" id="introTagline"></p>
          <p class="intro__text" id="introText"></p>
          <button class="btn btn--primary btn--large" data-action="next" id="startBtn"></button>
        </div>
      </section>

      <section class="step" data-step="1">
        <h2 class="step__title" id="aboutHerTitle"></h2>
        <p class="step__subtitle" id="aboutHerSub"></p>
        <div class="story" id="storyStack"></div>
        <div class="story__nav">
          <button class="btn btn--ghost" id="storyPrev" type="button">←</button>
          <span class="story__counter" id="storyCounter"></span>
          <button class="btn btn--primary" id="storyNext" type="button"></button>
        </div>
      </section>

      <section class="step" data-step="2">
        <h2 class="step__title" id="priorityTitle"></h2>
        <p class="step__subtitle" id="prioritySub"></p>
        <p class="choice__round" id="priorityRound"></p>
        <div class="choice" id="priorityChoice"></div>
      </section>

      <section class="step" data-step="3">
        <h2 class="step__title" id="foodTitle"></h2>
        <p class="step__subtitle" id="foodSub"></p>
        <p class="choice__round" id="foodRound"></p>
        <div class="choice" id="foodChoice"></div>
      </section>

      <section class="step" data-step="4">
        <h2 class="step__title" id="activityTitle"></h2>
        <p class="step__subtitle" id="activitySub"></p>
        <p class="choice__round" id="activityRound"></p>
        <div class="choice" id="activityChoice"></div>
      </section>

      <section class="step" data-step="5">
        <h2 class="step__title" id="whenTitle"></h2>
        <p class="step__subtitle" id="whenSub"></p>
        <form class="form" id="datetimeForm">
          <label class="field">
            <span class="field__label" id="labelDate"></span>
            <input class="field__input" type="date" name="date" id="dateInput" required>
          </label>
          <label class="field">
            <span class="field__label" id="labelTime"></span>
            <input class="field__input" type="time" name="time" id="timeInput" value="19:00" required>
          </label>
          <div class="chips" id="timeChips">
            <button type="button" class="chip" data-time="17:00">17:00</button>
            <button type="button" class="chip" data-time="18:00">18:00</button>
            <button type="button" class="chip chip--active" data-time="19:00">19:00</button>
            <button type="button" class="chip" data-time="20:00">20:00</button>
            <button type="button" class="chip" data-time="21:00">21:00</button>
          </div>
          <button class="btn btn--primary btn--large" type="submit" id="datetimeNextBtn"></button>
        </form>
      </section>

      <section class="step" data-step="6">
        <h2 class="step__title" id="whereTitle"></h2>
        <p class="step__subtitle" id="whereSub"></p>
        <p class="choice__round" id="placeRound"></p>
        <div class="choice" id="placeChoice"></div>
      </section>

      <section class="step" data-step="7">
        <h2 class="step__title" id="applyTitle"></h2>
        <p class="step__subtitle" id="applySub"></p>
        <div class="summary__card" id="previewCard"></div>
        <form class="form" id="applyForm">
          <label class="field">
            <span class="field__label" id="labelInstagram"></span>
            <input class="field__input" type="text" name="instagram" id="instagramInput" placeholder="@username" required inputmode="text" autocomplete="username" maxlength="40">
          </label>
          <button class="btn btn--primary btn--large" type="submit" id="submitBtn"></button>
        </form>
      </section>

      <section class="step" data-step="8">
        <div class="done">
          <div class="done__icon">💌</div>
          <h2 class="step__title" id="doneTitle"></h2>
          <p class="step__subtitle" id="doneText"></p>
          <p class="done__hint" id="doneHint"></p>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
