<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a0a2e">
  <meta name="description" content="Анкета на побачення у Вінниці">
  <title>Побачення у Вінниці</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="header" id="header">
      <div class="header__brand" id="brand"></div>
      <div class="header__progress">
        <div class="header__progress-bar" id="progressBar"></div>
      </div>
      <div class="header__step" id="stepLabel"></div>
    </header>

    <main class="main" id="main">
      <!-- Intro: her photos + short bio -->
      <section class="step step--active" data-screen="intro">
        <div class="intro">
          <div class="intro__gallery" id="introGallery">
            <div class="intro__slides" id="introSlides"></div>
            <button type="button" class="intro__nav intro__nav--prev" id="introPrev" aria-label="Previous photo"></button>
            <button type="button" class="intro__nav intro__nav--next" id="introNext" aria-label="Next photo"></button>
            <div class="intro__counter" id="introCounter"></div>
          </div>
          <div class="intro__dots" id="introDots"></div>
          <div class="intro__meta" id="introMeta"></div>
          <h1 class="intro__title" id="introTitle"></h1>
          <p class="intro__tagline" id="introTagline"></p>
          <p class="intro__text" id="introText"></p>
          <button class="btn btn--primary btn--large" id="startBtn"></button>
        </div>
      </section>

      <!-- When -->
      <section class="step" data-screen="when">
        <h2 class="step__title" id="whenTitle"></h2>
        <p class="step__subtitle" id="whenSub"></p>
        <form class="form" id="datetimeForm">
          <label class="field">
            <span class="field__label" id="labelDate"></span>
            <input class="field__input" type="date" name="date" id="dateInput" required>
          </label>
          <label class="field">
            <span class="field__label" id="labelTime"></span>
            <input class="field__input" type="time" name="time" id="timeInput" value="19:00" required>
          </label>
          <div class="chips" id="timeChips">
            <button type="button" class="chip" data-time="17:00">17:00</button>
            <button type="button" class="chip" data-time="18:00">18:00</button>
            <button type="button" class="chip chip--active" data-time="19:00">19:00</button>
            <button type="button" class="chip" data-time="20:00">20:00</button>
            <button type="button" class="chip" data-time="21:00">21:00</button>
          </div>
          <button class="btn btn--primary btn--large" type="submit" id="datetimeNextBtn"></button>
        </form>
      </section>

      <!-- Branching choices (reused) -->
      <section class="step" data-screen="question">
        <h2 class="step__title" id="questionTitle"></h2>
        <p class="step__subtitle" id="questionSub"></p>
        <div class="choice" id="choiceList"></div>
        <button class="btn btn--primary btn--large choice__next" id="multiNextBtn" type="button" hidden disabled></button>
      </section>

      <!-- Application -->
      <section class="step" data-screen="apply">
        <h2 class="step__title" id="applyTitle"></h2>
        <p class="step__subtitle" id="applySub"></p>
        <div class="summary__card" id="previewCard"></div>
        <form class="form" id="applyForm">
          <label class="field">
            <span class="field__label" id="labelInstagram"></span>
            <input class="field__input" type="text" name="instagram" id="instagramInput" required inputmode="text" autocomplete="username" maxlength="40">
          </label>
          <button class="btn btn--primary btn--large" type="submit" id="submitBtn"></button>
        </form>
      </section>

      <!-- Done -->
      <section class="step" data-screen="done">
        <div class="done">
          <div class="done__icon">💌</div>
          <h2 class="step__title" id="doneTitle"></h2>
          <p class="step__subtitle" id="doneText"></p>
          <p class="done__hint" id="doneHint"></p>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
